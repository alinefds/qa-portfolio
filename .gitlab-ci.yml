# Job Docker - execução dos testes em container Docker
WEB Testing in Chrome and Docker:
    stage: Acceptance Tests
    image: registry.gitlab.com/myrobotprojects2433721/mydockerimages:latest
    tags:
        - gitlab-org-docker
    artifacts:
        when: always
        paths:
            - ./results
        expire_in: 1 week
    script:
        - robot -d ./results -v BROWSER:headlesschrome web-tests/tests/criar_usuario.robot
    retry: 1